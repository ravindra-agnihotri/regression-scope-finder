<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Regression Scope Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
<div class="max-w-5xl mx-auto p-8">
    <h1 class="text-3xl font-bold text-slate-800 mb-2">Git Regression Scope Finder</h1>
    <p class="text-slate-600 mb-8">Find changed files, lines, and Java methods between two branches.</p>

    <div class="bg-white rounded-xl shadow p-6 space-y-4">
        <div class="grid md:grid-cols-3 gap-4">
            <input id="repoPath" class="border rounded p-2" placeholder="Local repository path (e.g. /workspace/my-repo)">
            <input id="baseBranch" class="border rounded p-2" placeholder="Base branch" value="master">
            <input id="targetBranch" class="border rounded p-2" placeholder="Feature branch" value="feature">
        </div>

        <button id="analyzeBtn" class="bg-blue-600 text-white px-5 py-2 rounded">Analyze Diff Scope</button>
        <div id="status" class="text-sm text-slate-600"></div>
    </div>

    <div id="summary" class="mt-6"></div>
    <div id="details" class="mt-6"></div>
</div>

<script>
    const analyzeBtn = document.getElementById('analyzeBtn');

    analyzeBtn.addEventListener('click', async () => {
        const repoPath = document.getElementById('repoPath').value.trim();
        const baseBranch = document.getElementById('baseBranch').value.trim();
        const targetBranch = document.getElementById('targetBranch').value.trim();

        const status = document.getElementById('status');
        const summary = document.getElementById('summary');
        const details = document.getElementById('details');

        if (!repoPath || !baseBranch || !targetBranch) {
            status.textContent = 'Please fill repo path, base branch, and target branch.';
            return;
        }

        status.textContent = 'Running git diff analysis...';
        summary.innerHTML = '';
        details.innerHTML = '';

        const params = new URLSearchParams({repoPath, baseBranch, targetBranch});

        try {
            const response = await fetch(`/api/diff-scope?${params.toString()}`);
            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || 'Analysis failed');
            }

            const data = await response.json();
            status.textContent = 'Analysis complete.';

            summary.innerHTML = `
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-white rounded-xl shadow p-4"><div class="text-sm text-slate-500">Files changed</div><div class="text-2xl font-bold">${data.totalFilesChanged}</div></div>
                    <div class="bg-white rounded-xl shadow p-4"><div class="text-sm text-slate-500">Lines changed</div><div class="text-2xl font-bold">${data.totalLinesChanged}</div></div>
                    <div class="bg-white rounded-xl shadow p-4"><div class="text-sm text-slate-500">Methods changed</div><div class="text-2xl font-bold">${data.totalMethodsChanged}</div></div>
                </div>
                <p class="text-sm text-slate-500 mt-3">Compared <span class="font-medium">${data.baseRef}</span> ➜ <span class="font-medium">${data.targetRef}</span></p>
            `;

            details.innerHTML = data.files.map(file => `
                <div class="bg-white rounded-xl shadow p-4 mb-4">
                    <h3 class="font-semibold text-slate-800">${file.path}</h3>
                    <p class="text-sm text-slate-600 mt-2">Changed lines: ${file.changedLines.length ? file.changedLines.join(', ') : 'None'}</p>
                    <p class="text-sm text-slate-600 mt-2">Changed methods:</p>
                    <ul class="list-disc ml-6 mt-1 text-sm text-slate-700">
                        ${file.changedMethods.length
                            ? file.changedMethods.map(method => `<li>${method}</li>`).join('')
                            : '<li>No Java method-level change detected.</li>'}
                    </ul>
                </div>
            `).join('');
        } catch (error) {
            status.textContent = `Error: ${error.message}`;
        }
    });
</script>
</body>
</html>
